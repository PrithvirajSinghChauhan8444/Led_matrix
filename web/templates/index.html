<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMO / CONSOLE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="toast-container"></div>
    <div class="glass-container main-layout">
        <div class="chat-section">
            <header>
                <h1>EMOBOT / 01</h1>
                <div style="display:flex;align-items:center;gap:12px">
                    <div id="notif-bell" class="notif-bell" onclick="fetchAndShowNotification()" title="Notifications">
                        <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        <span class="notif-dot"></span>
                    </div>
                    <div id="mood-badge" class="mood-badge">NORMAL</div>
                </div>
            </header>
            <div class="virtual-preview">
                <div id="virtual-matrix" class="matrix-grid"></div>
            </div>
            <div id="live-stats">
                <span>MOOD: <strong id="stat-mood">NORMAL</strong></span> &nbsp;
                <span>IDLE: <strong id="stat-idle">0s</strong></span> &nbsp;
                <span>STATE: <strong id="stat-state">ACTIVE</strong></span>
            </div>
            <div class="chat-wrapper" id="chat-wrapper">
                <div class="message assistant">
                    <div class="bubble">SYSTEM INITIALIZED. STANDING BY.</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" placeholder="INPUT COMMAND..." autocomplete="off">
                <div id="send-btn" class="send-btn-wrap">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                      <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>
            <div class="shout-area" style="margin-top: 10px; display: flex; gap: 5px;">
                <input type="text" id="shout-input" placeholder="SHOUT MESSAGE..." style="flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #222; color: #fff; padding: 8px; border-radius: 4px; font-size: 0.7rem; font-family: monospace;">
                <button onclick="sendShout()" style="padding: 5px 15px; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold;">SHOUT</button>
            </div>
        </div>
        <div class="control-section">
            <h3>CONSOLE</h3>
            
            <h4>System Stats</h4>
            <div class="btn-grid">
                <button onclick="triggerStat('time')">Time</button>
                <button onclick="triggerStat('cpu')">CPU %</button>
                <button onclick="triggerStat('ram')">RAM %</button>
                <button onclick="triggerStat('battery')">Battery</button>
                <button onclick="triggerStat('uptime')" class="full">Uptime</button>
                <button onclick="fetch('/show_stats')" style="color:#444">Cycle All</button>
                <button onclick="triggerStat('stop')" style="color:#666">Stop Stats</button>
            </div>

            <h4>Animations</h4>
            <div class="btn-grid">
                <button onclick="control('mode', '2')">Eyes</button>
                <button onclick="control('mode', 'a')">Dog</button>
                <button onclick="control('mood', 'GAME')">Game</button>
                <button onclick="control('mode', '99')">Text</button>
            </div>
            
            <h4>Emotions</h4>
            <div class="btn-grid moods">
                <button onclick="feed()" style="grid-column: span 2; background: rgba(255,255,255,0.1); border-color: #f59e0b;">Feed 🍪</button>
                <button onclick="control('mood', 'HAPPY')">Happy</button>
                <button onclick="control('mood', 'ANGRY')">Angry</button>
                <button onclick="control('mood', 'SAD')">Sad</button>
                <button onclick="control('mood', 'NAUGHTY')">Naughty</button>
                <button onclick="control('mood', 'DANCE')">Dance</button>
                <button onclick="control('mood', 'STARS')">Stars</button>
                <button onclick="control('mood', 'DIZZY')">Dizzy</button>
                <button onclick="control('mood', 'LOVE')">Love</button>
                <button onclick="control('mood', 'SAD_CRY')">Sad Cry</button>
                <button onclick="control('mood', 'HAPPY_CRY')">Happy Cry</button>
                <button onclick="control('mood', 'THINK')">Think</button>
                <button onclick="control('mood', 'SNEEZE')">Sneeze</button>
                <button onclick="control('mood', 'WINK')">Wink</button>
                <button onclick="control('mood', 'EXCLAIM')">❗</button>
                <button onclick="control('mood', 'QUESTION')">❓</button>
            </div>

            <h4>Hardware</h4>
            <div class="btn-grid">
                <button onclick="control('cmd', '+')">Light +</button>
                <button onclick="control('cmd', '-')">Light -</button>
                <button onclick="control('cmd', 'i')" class="full">Invert Signal</button>
            </div>

            <h4>Orientation</h4>
            <div class="btn-grid">
                <button onclick="toggleConfig('flipH')">Flip H</button>
                <button onclick="toggleConfig('flipV')">Flip V</button>
                <button onclick="control('config', {rotate: 180})">Rotate 180</button>
                <button onclick="control('config', {rotate: 0})">Rotate 0</button>
                <button onclick="control('config', {rotate: 0, flipH: false, flipV: false})" class="full" style="color: #666">Reset All</button>
            </div>

            <h4>Notifications</h4>
            <div class="notif-toggle">
                <label>Proactive Alerts</label>
                <div id="notif-toggle" class="toggle-switch active" onclick="toggleNotifications()"></div>
            </div>
            <div class="notif-toggle">
                <label>Quiet Hours</label>
                <span style="font-size:0.7rem;color:#666;font-family:monospace" id="quiet-hours-label">23:00 – 08:00</span>
            </div>
            <div class="btn-grid" style="margin-top:8px">
                <button onclick="fetch('/notifications/test_idle')" class="full" style="color:#666">⚡ Test Idle Trigger</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}?v=4"></script>
</body>
</html>
